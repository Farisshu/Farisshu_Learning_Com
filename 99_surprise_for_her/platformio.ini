; PlatformIO Project Configuration File
; 99 Surprise For Her - ESP32 TFT Animation Project
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
; Test: pio test
; Check: pio check

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# Serial Configuration
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

# Library Dependencies
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

# Build Flags - TFT ST7735 Configuration
build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7735_DRIVER=1
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=160
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=17
    -D TFT_RST=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D BL=2
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=2000000
    -D SMOOTH_FONT=1

# Optimization for smooth animation
build_unflags = -Os