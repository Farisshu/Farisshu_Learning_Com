; PlatformIO Project Configuration File
; 07 CAN Bus Node - Slave Node (Receiver with FreeRTOS)
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
; Test: pio test
; Check: pio check

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# Serial Configuration
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

# Library Dependencies - MCP2515 CAN Controller
lib_deps =
    https://github.com/coryjfowler/MCP_CAN_lib.git

# Build Flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CONFIG_SPIFFS_USE_MTIME=0

# Optimization
build_unflags = -Os
# Static Analysis (Optional - Uncomment to enable)
# check_tool = cppcheck, clangtidy
# check_flags =
#     cppcheck: --enable=warning,performance,portability --std=c++11 --inline-suppr
