name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [ "*" ]  # Jalan di branch apa saja
    paths:
      - '07_can_bus_node/**'  # Hanya jalan jika folder ini berubah
  pull_request:
    branches: [ "*" ]
    paths:
      - '07_can_bus_node/**'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 🔧 Install PlatformIO
      run: pip install platformio

    - name: 🧪 Run Unit Tests
      run: |
        # Masuk ke folder test yang punya platformio.ini sendiri
        cd 07_can_bus_node/test
        pio test -e native -v
