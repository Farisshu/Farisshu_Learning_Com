; PlatformIO Project Configuration File
; 990 ESP32 SPI Master-Slave - Bidirectional SPI Communication Demo
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
; Test: pio test
; Check: pio check

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# Serial Configuration
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

# Library Dependencies
lib_deps =
    ; No external libraries required - Using built-in SPI

# Build Flags
build_flags =
    -D CORE_DEBUG_LEVEL=3

# Optimization
build_unflags = -Os
build_flags += -O2
