; PlatformIO Project Configuration File
; 03 Industrial HMI - ESP32 TFT Human Machine Interface
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
; Test: pio test
; Check: pio check (cppcheck, clang-tidy)
;
; FreeRTOS Compliance: Yes
; Coding Standard: FreeRTOS V10.x

[platformio]
default_envs = esp32dev
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

# ============================================================================
# SERIAL CONFIGURATION
# ============================================================================
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

# ============================================================================
# LIBRARY DEPENDENCIES
# ============================================================================
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

# ============================================================================
# BUILD FLAGS
# ============================================================================
build_flags =
    ; Core configuration
    -D CORE_DEBUG_LEVEL=3
    -D DEBUG
    
    ; TFT ST7735 Configuration
    -D USER_SETUP_LOADED=1
    -D ST7735_DRIVER=1
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=160
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=17
    -D TFT_RST=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D BL=2
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=2000000
    -D SMOOTH_FONT=1
    
    ; Include paths
    -I include
    -I ../../include
    -O2

# ============================================================================
# OPTIMIZATION
# ============================================================================
build_unflags = -Os

# ============================================================================
# CODE QUALITY (cppcheck, clang-tidy)
# ============================================================================
check_tool = cppcheck, clangtidy
check_skip_packages = yes
check_flags =
    cppcheck: --enable=all --std=c++11 --inline-suppr --suppress=missingIncludeSystem
    clangtidy: --checks=-*,bugprone-*,cert-*,clang-analyzer-*,misc-*,readability-*

# ============================================================================
# UNIT TESTING
# ============================================================================
test_framework = unity
test_ignore = test_desktop
